version: '3.8'

x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  image: local_airflow_pyspark:latest
  environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres/airflow
    - AIRFLOW__CORE__LOAD_EXAMPLES=false
    - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
    - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth
    - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
    - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    - AWS_DEFAULT_REGION=us-east-1
    - MINIO_ENDPOINT=http://minio:9000
    - POSTGRES_HOST=postgres
    - SPARK_JARS_DIR=/opt/spark/jars
    - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW__CORE__FERNET_KEY}
    - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW__WEBSERVER__SECRET_KEY}
    - AIRFLOW__METRICS__STATSD_ON=True
    - AIRFLOW__METRICS__STATSD_HOST=statsd-exporter
    - AIRFLOW__METRICS__STATSD_PORT=9125
    - AIRFLOW__METRICS__STATSD_PREFIX=airflow
    - PUSHGATEWAY_URL=http://pushgateway:9091
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./data:/opt/airflow/data  # Temporary mount so Airflow can see local data before we move fully to MinIO
    - ./hadoop:/opt/airflow/hadoop
    - ./logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:
  # ─────────────────────────────────────────────────────────────────────────────
  # METADATA DATABASE (Airflow)
  # ─────────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:13
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - AIRFLOW_DB_USER=${AIRFLOW_DB_USER}
      - AIRFLOW_DB_PASSWORD=${AIRFLOW_DB_PASSWORD}
      - PG_USER=${PG_USER}
      - PG_PASS=${PG_PASS}
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
      # Init script to create multiple databases
      - ./docker/postgres-init.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      retries: 5
    ports:
      - "5432:5432"
    mem_limit: 256m
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────────
  # STORAGE: MinIO (S3-compatible Object Storage)
  # ─────────────────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2023-11-20T22-40-07Z
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"  # API port
      - "9001:9001"  # Console UI port
    volumes:
      - minio-data-volume:/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/9000 && echo ok'"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    restart: unless-stopped

  # Task 6.3 Automation: Auto-create the 'lakehouse' bucket on startup
  minio-init:
    image: minio/mc:RELEASE.2023-11-20T16-30-59Z
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      mc alias set local_minio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb local_minio/lakehouse || true;
      mc anonymous set public local_minio/lakehouse;
      echo 'Bucket lakehouse created!';
      "

  # ─────────────────────────────────────────────────────────────────────────────
  # ORCHESTRATION: Apache Airflow
  # ─────────────────────────────────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    command: version
    restart: "no"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres/airflow
      - _AIRFLOW_DB_UPGRADE=true
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=${_AIRFLOW_WWW_USER_USERNAME}
      - _AIRFLOW_WWW_USER_PASSWORD=${_AIRFLOW_WWW_USER_PASSWORD}
      - _AIRFLOW_WWW_USER_EMAIL=${_AIRFLOW_WWW_USER_EMAIL}
      - _AIRFLOW_WWW_USER_ROLE=Admin
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW__CORE__FERNET_KEY}
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW__WEBSERVER__SECRET_KEY}

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    mem_limit: 800m
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    mem_limit: 512m
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────────
  # API: FastAPI backend (queries PostgreSQL gold tables)
  # ─────────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_DB=lakehouse
      - PG_USER=${PG_USER}
      - PG_PASS=${PG_PASS}
      - PUSHGATEWAY_URL=http://pushgateway:9091
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 128m
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────────
  # FRONTEND: React + Vite dashboard (served by nginx)
  # ─────────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:4173"
    mem_limit: 128m
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────────
  # OBSERVABILITY STACK
  # ─────────────────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerting_rules.yml:/etc/prometheus/alerting_rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    ports:
      - "9090:9090"
    mem_limit: 256m
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    mem_limit: 128m
    restart: unless-stopped

  loki:
    image: grafana/loki:3.0.0
    volumes:
      - ./monitoring/loki.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    mem_limit: 128m
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.0.0
    volumes:
      - ./monitoring/promtail.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    mem_limit: 64m
    restart: unless-stopped

  pushgateway:
    image: prom/pushgateway:v1.8.0
    ports:
      - "9091:9091"
    mem_limit: 64m
    restart: unless-stopped

  statsd-exporter:
    image: prom/statsd-exporter:v0.27.0
    volumes:
      - ./monitoring/statsd_mapping.yml:/etc/statsd_mapping.yml:ro
    command: --statsd.mapping-config=/etc/statsd_mapping.yml
    ports:
      - "9125:9125/udp"
      - "9102:9102"
    mem_limit: 64m
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/lakehouse?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 64m
    restart: unless-stopped

volumes:
  postgres-db-volume:
  minio-data-volume:
  prometheus-data:
  grafana-data:
  loki-data:
