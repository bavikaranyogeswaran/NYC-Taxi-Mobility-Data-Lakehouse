name: CD

# Runs on every push to main.
# Branch protection rules ensure CI passes before any merge reaches main.
#
# ── Required GitHub Secrets (Settings → Secrets → Actions) ───────────────────
#   STAGING_HOST      IP or hostname of the staging server
#   STAGING_USER      SSH username on the staging server  (e.g. ubuntu)
#   PRODUCTION_HOST   IP or hostname of the production server
#   PRODUCTION_USER   SSH username on the production server
#   SSH_PRIVATE_KEY   Private key whose public key is in authorized_keys on both servers
#   GHCR_TOKEN        Personal Access Token with read:packages scope
#                     (servers need this to pull private GHCR images)
#
# ── Required GitHub Environments (Settings → Environments) ───────────────────
#   staging     Optional approval gate — leave ungated for auto-deploy
#   production  Add Required reviewers to enforce a manual approval before every
#               production deploy
#
# ── Server prerequisite ───────────────────────────────────────────────────────
#   Docker + Docker Compose installed; repo cloned to /opt/nyc-taxi-lakehouse;
#   a valid .env file present at that path.

on:
  workflow_dispatch:    # run manually from GitHub Actions tab when servers are ready

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Build all three images and push to GHCR.
  #    Each image is tagged with both :latest and :<sha> for traceability.
  #    GHA layer cache is shared with the Docker build CI workflow so re-builds
  #    of unchanged layers are instant.
  # ─────────────────────────────────────────────────────────────────────────────
  build-push:
    name: Build & push ${{ matrix.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: airflow
            context: .
            file: Dockerfile.airflow
          - name: api
            context: ./api
            file: api/Dockerfile
          - name: frontend
            context: ./frontend
            file: frontend/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/nyc-taxi-${{ matrix.name }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/nyc-taxi-${{ matrix.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Deploy the pushed images to the staging server.
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: build-push
    environment: staging

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          GHCR_OWNER: ${{ github.repository_owner }}
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,GHCR_OWNER,IMAGE_TAG
          script: |
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin
            cd /opt/nyc-taxi-lakehouse
            IMAGE_TAG="${IMAGE_TAG}" GHCR_OWNER="${GHCR_OWNER}" \
              docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            IMAGE_TAG="${IMAGE_TAG}" GHCR_OWNER="${GHCR_OWNER}" \
              docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build --remove-orphans
            docker image prune -f

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Verify staging is healthy before a production deploy is allowed.
  # ─────────────────────────────────────────────────────────────────────────────
  smoke-staging:
    name: Smoke test staging
    runs-on: ubuntu-latest
    needs: deploy-staging

    steps:
      - name: Assert /health returns 200
        run: |
          curl --fail --retry 12 --retry-delay 5 --retry-all-errors \
            http://${{ secrets.STAGING_HOST }}:8000/health

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. Deploy to production — pauses here for a manual reviewer approval.
  #    Enable the gate: Settings → Environments → production → Required reviewers.
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: smoke-staging
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          GHCR_OWNER: ${{ github.repository_owner }}
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,GHCR_OWNER,IMAGE_TAG
          script: |
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin
            cd /opt/nyc-taxi-lakehouse
            IMAGE_TAG="${IMAGE_TAG}" GHCR_OWNER="${GHCR_OWNER}" \
              docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            IMAGE_TAG="${IMAGE_TAG}" GHCR_OWNER="${GHCR_OWNER}" \
              docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build --remove-orphans
            docker image prune -f

      - name: Assert production /health returns 200
        run: |
          curl --fail --retry 5 --retry-delay 5 --retry-all-errors \
            http://${{ secrets.PRODUCTION_HOST }}:8000/health
