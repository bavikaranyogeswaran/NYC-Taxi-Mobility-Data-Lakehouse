name: Docker build

# Runs on pull requests to verify Dockerfiles build cleanly before merge.
# Push-to-main builds are handled by cd.yml, which also pushes to GHCR.
# GHA layer caching means the 300 MB Airflow JAR download is skipped on re-runs
# unless Dockerfile.airflow or requirements.txt actually changes.
on:
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Airflow image — heaviest build (downloads Spark + Delta + S3 JARs).
  # Docker layer cache (type=gha) means JAR downloads are skipped on re-runs
  # unless Dockerfile.airflow or requirements.txt actually changes.
  # ─────────────────────────────────────────────────────────────────────────────
  build-airflow:
    name: Airflow image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Airflow image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.airflow
          push: false
          tags: nyc-taxi-airflow:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # API image — lightweight Python/FastAPI image (~50 MB).
  # ─────────────────────────────────────────────────────────────────────────────
  build-api:
    name: API image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: api/Dockerfile
          push: false
          tags: nyc-taxi-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend image — multi-stage: Node build → nginx serve.
  # ─────────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: Frontend image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: false
          tags: nyc-taxi-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
